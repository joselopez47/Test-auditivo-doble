<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Auditivo - Escáner en Tiempo Real</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #F3F4F6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            display: flex;
            width: 850px;
            height: 600px;
            background-color: #1D1D1D;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .col-left {
            flex: 1.2;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .col-right {
            flex: 0.8;
            background-color: #1E293B;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h2 { font-size: 22px; margin-bottom: 5px; color: #F3F4F6; text-align: center;}
        p.subtitle { color: #9CA3AF; font-size: 12px; margin-bottom: 20px; text-align: center; }
        
        /* Contenedor del Canvas de la Onda (Osciloscopio) */
        .wave-container {
            width: 320px;
            height: 120px;
            background-color: #0F172A;
            border: 2px solid #334155;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
        }
        #canvasOnda {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Contenedor y diseño del Slider Moderno */
        .slider-container {
            width: 320px;
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .modern-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #374151;
            outline: none;
            transition: background 0.2s;
            cursor: pointer;
        }
        .modern-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #3B82F6;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
            transition: transform 0.1s;
        }
        .modern-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: #60A5FA;
        }
        .slider-labels {
            display: flex;
            justify-content: space-between;
            width: 100%;
            color: #6B7280;
            font-size: 11px;
            margin-top: 8px;
        }

        /* Contenedor del Display con Botones +/- */
        .freq-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }
        .btn-step {
            background-color: #374151;
            color: #F3F4F6;
            width: 85px;
            padding: 8px 0;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            user-select: none;
        }
        .btn-step:hover { background-color: #4B5563; }
        
        /* Display editable */
        .freq-wrapper {
            min-width: 140px;
            text-align: center;
        }
        .freq-display {
            font-size: 24px;
            font-weight: bold;
            color: #3B82F6;
            cursor: pointer;
            padding: 2px 5px;
            border-radius: 4px;
            transition: background 0.2s;
            display: inline-block;
        }
        .freq-display:hover {
            background-color: #2D3748;
        }
        .freq-input {
            font-size: 22px;
            font-weight: bold;
            color: #3B82F6;
            background-color: #0F172A;
            border: 2px solid #3B82F6;
            border-radius: 6px;
            width: 110px;
            text-align: center;
            outline: none;
        }
        .freq-input::-webkit-outer-spin-button,
        .freq-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        button {
            width: 320px;
            padding: 12px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 14px;
        }
        .btn-audio { background-color: #3B82F6; color: white; }
        .btn-audio.active { background-color: #EF4444; }
        
        .actions-container {
            display: flex;
            gap: 10px;
            width: 300px;
            justify-content: center;
        }
        .btn-action {
            background-color: #10B981;
            color: white;
            flex: 1;
            font-size: 13px;
            padding: 12px 5px;
        }
        .btn-action:hover { background-color: #059669; }
        
        .status-lbl {
            color: #94A3B8;
            font-style: italic;
            font-size: 13px;
            text-align: center;
            height: 40px;
            margin: 15px 0;
        }
        
        .led-screen {
            background-color: #0F172A;
            width: 300px;
            height: 120px;
            border-radius: 10px;
            display: flex;
        }
        .led-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 14px;
            color: #94A3B8;
        }
        .led-section:first-child {
            border-right: 1px solid #1E293B;
        }
        .led-val {
            font-size: 22px;
            font-weight: bold;
            color: #F8FAFC;
            margin-top: 5px;
        }
        
        .separator {
            width: 260px;
            height: 2px;
            background-color: #334155;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="col-left">
        <h2>Generador de Tonos Dinámico</h2>
        <p class="subtitle">Monitoreo de onda senoidal en tiempo real:</p>
        
        <div class="wave-container">
            <canvas id="canvasOnda" width="320" height="120"></canvas>
        </div>

        <div class="slider-container">
            <input type="range" id="sliderFrecuencia" class="modern-slider" min="20" max="22000" value="12000">
            <div class="slider-labels">
                <span>20 Hz</span>
                <span>11000 Hz</span>
                <span>22000 Hz</span>
            </div>
        </div>
        
        <div class="freq-container">
            <button class="btn-step" id="btnMenos">Anterior (-100)</button>
            <div class="freq-wrapper" id="freqWrapper">
                <div class="freq-display" id="lblFrecuencia">12000 Hz</div>
            </div>
            <button class="btn-step" id="btnMas">Siguiente (+100)</button>
        </div>
        
        <button class="btn-audio" id="btnEscuchar">▶ Encender Tono Continuo</button>
    </div>

    <div class="col-right">
        <h2 style="color: #38BDF8;">Consola de Análisis</h2>
        
        <div class="actions-container">
            <button class="btn-action" id="btnVol1">Voluntario 1<br>[ Sí lo escucho ]</button>
            <button class="btn-action" id="btnVol2" style="background-color: #0EA5E9;">Voluntario 2<br>[ Sí lo escucho ]</button>
        </div>
        
        <div class="status-lbl" id="lblEstado">Encendé el tono y mové el slider<br>para escanear tu oído.</div>
        <div class="separator"></div>
        
        <div class="led-screen">
            <div class="led-section">
                <span>Voluntario 1</span>
                <div class="led-val" id="resVol1">--</div>
            </div>
            <div class="led-section">
                <span>Voluntario 2</span>
                <div class="led-val" id="resVol2">--</div>
            </div>
        </div>
    </div>
</div>

<script>
    let reproduciendo = false;
    let frecuenciaActual = 12000;
    
    // Variables de Audio Context y Nodos analizados
    let audioCtx = null;
    let oscillator = null;
    let gainNode = null;
    let analyser = null;
    let bufferLength = 0;
    let dataArray = null;

    const FRECUENCIAS_REFE = [20, 250, 8000, 12000, 15000, 16000, 17400, 19000, 20000, 22000];
    const EDADES_REFE      = [90.0, 80.0, 70.0, 50.0, 40.0, 30.0, 25.0, 22.0, 20.0, 18.0];

    const F_MIN = 20;
    const F_MAX = 22000;

    function calcularEdadAuditiva(hz) {
        if (hz <= FRECUENCIAS_REFE[0]) return EDADES_REFE[0];
        if (hz >= FRECUENCIAS_REFE[FRECUENCIAS_REFE.length - 1]) return EDADES_REFE[EDADES_REFE.length - 1];
        
        for (let i = 0; i < FRECUENCIAS_REFE.length - 1; i++) {
            if (hz >= FRECUENCIAS_REFE[i] && hz <= FRECUENCIAS_REFE[i+1]) {
                let t = (hz - FRECUENCIAS_REFE[i]) / (FRECUENCIAS_REFE[i+1] - FRECUENCIAS_REFE[i]);
                return (EDADES_REFE[i] + t * (EDADES_REFE[i+1] - EDADES_REFE[i])).toFixed(1);
            }
        }
        return 50;
    }

    // Elementos del DOM
    const canvasOnda = document.getElementById('canvasOnda');
    const ctxOnda = canvasOnda.getContext('2d');
    const slider = document.getElementById('sliderFrecuencia');
    const freqWrapper = document.getElementById('freqWrapper');
    const lblFrecuencia = document.getElementById('lblFrecuencia');
    const btnEscuchar = document.getElementById('btnEscuchar');
    const btnVol1 = document.getElementById('btnVol1');
    const btnVol2 = document.getElementById('btnVol2');
    const btnMenos = document.getElementById('btnMenos');
    const btnMas = document.getElementById('btnMas');
    const lblEstado = document.getElementById('lblEstado');
    const resVol1 = document.getElementById('resVol1');
    const resVol2 = document.getElementById('resVol2');

    // Audio Progresivo ultrasuave con rampas exponenciales
    function actualizarFrecuenciaAudio(hz) {
        if (oscillator && reproduciendo) {
            oscillator.frequency.cancelScheduledValues(audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(hz, audioCtx.currentTime + 0.04);
        }
    }

    // Cambiar frecuencia globalmente y sincronizar slider + pantalla
    function cambiarFrecuenciaGlobal(nuevaFreq) {
        frecuenciaActual = Math.max(F_MIN, Math.min(F_MAX, nuevaFreq));
        lblFrecuencia.innerText = `${frecuenciaActual} Hz`;
        slider.value = frecuenciaActual;
        actualizarFrecuenciaAudio(frecuenciaActual);
    }

    // Listener del Slider
    slider.addEventListener('input', (e) => {
        cambiarFrecuenciaGlobal(parseInt(e.target.value));
    });

    // Pasos lineales fijos de +/- 100 Hz
    btnMenos.addEventListener('click', () => {
        cambiarFrecuenciaGlobal(frecuenciaActual - 100);
    });

    btnMas.addEventListener('click', () => {
        cambiarFrecuenciaGlobal(frecuenciaActual + 100);
    });

    // Edición manual en caliente al hacer clic sobre los Hz
    lblFrecuencia.addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'number';
        input.className = 'freq-input';
        input.value = frecuenciaActual;
        input.min = F_MIN;
        input.max = F_MAX;

        freqWrapper.innerHTML = '';
        freqWrapper.appendChild(input);
        input.focus();
        input.select();

        function procesarEntradaManual() {
            let valor = parseInt(input.value);
            if (isNaN(valor)) valor = frecuenciaActual;
            
            freqWrapper.innerHTML = '';
            freqWrapper.appendChild(lblFrecuencia);
            
            cambiarFrecuenciaGlobal(valor);
        }

        input.addEventListener('blur', () => { procesarEntradaManual(); });
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') procesarEntradaManual(); });
    });

    // Bucle de renderizado para el osciloscopio gráfico (Canvas)
    function dibujarOsciloscopio() {
        requestAnimationFrame(dibujarOsciloscopio);

        const width = canvasOnda.width;
        const height = canvasOnda.height;

        // Limpieza de pantalla con leve desenfoque para dar un efecto LED retroiluminado
        ctxOnda.fillStyle = '#0F172A';
        ctxOnda.fillRect(0, 0, width, height);

        ctxOnda.lineWidth = 2.5;
        ctxOnda.strokeStyle = reproduciendo ? '#10B981' : '#475569'; // Verde esmeralda si suena, gris si está apagado
        ctxOnda.beginPath();

        if (reproduciendo && analyser) {
            // Si hay audio activo, leemos el buffer de ondas de tiempo real
            analyser.getByteTimeDomainData(dataArray);

            let sliceWidth = width / bufferLength;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                let v = dataArray[i] / 128.0;
                let y = (v * height) / 2;

                if (i === 0) {
                    ctxOnda.moveTo(x, y);
                } else {
                    ctxOnda.lineTo(x, y);
                }
                x += sliceWidth;
            }
        } else {
            // Línea de base plana si el sonido está apagado
            ctxOnda.moveTo(0, height / 2);
            ctxOnda.lineTo(width, height / 2);
        }

        ctxOnda.lineTo(width, height / 2);
        ctxOnda.stroke();
    }

    // Control de encendido/apagado del Tono Continuo
    btnEscuchar.addEventListener('click', () => {
        if (!reproduciendo) {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();
            analyser = audioCtx.createAnalyser(); // Inicializamos el analizador de espectro
            
            // Configuración del analizador
            analyser.fftSize = 2048;
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(frecuenciaActual, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);

            // Ruteo de nodos: Oscilador -> Analizador -> Volumen (Gain) -> Parlantes
            oscillator.connect(analyser);
            analyser.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();

            reproduciendo = true;
            btnEscuchar.innerText = "■ Detener Tono";
            btnEscuchar.classList.add('active');
            lblEstado.innerHTML = "Tono activo.<br>Mové el slider para calibrar tu oído.";
            lblEstado.style.color = "#60A5FA";
        } else {
            detenerAudio();
        }
    });

    function detenerAudio() {
        if (reproduciendo) {
            oscillator.stop();
            oscillator.disconnect();
            reproduciendo = false;
            btnEscuchar.innerText = "▶ Encender Tono Continuo";
            btnEscuchar.classList.remove('active');
            lblEstado.innerHTML = "Tono apagado.<br>Consola lista.";
            lblEstado.style.color = "#6B7280";
        }
    }

    function procesarVoluntario(num) {
        detenerAudio();
        lblEstado.innerHTML = `Calculando Voluntario ${num}...`;
        lblEstado.style.color = "#A78BFA";

        setTimeout(() => {
            let edad = calcularEdadAuditiva(frecuenciaActual);
            if(num === 1) {
                resVol1.innerHTML = `${edad}<br><span style="font-size:12px;">años</span>`;
            } else {
                resVol2.innerHTML = `${edad}<br><span style="font-size:12px;">años</span>`;
            }
            lblEstado.innerHTML = "¡Cálculo procesado<br>con éxito!";
            lblEstado.style.color = "#34D399";
        }, 300);
    }

    btnVol1.addEventListener('click', () => procesarVoluntario(1));
    btnVol2.addEventListener('click', () => procesarVoluntario(2));

    // Inicializar el bucle de renderizado gráfico de la onda
    dibujarOsciloscopio();
    cambiarFrecuenciaGlobal(frecuenciaActual);
</script>
</body>
</html>
